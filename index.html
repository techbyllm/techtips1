<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Tips by LLM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e12;--bg2:#13131a;
  --surface:rgba(255,255,255,0.035);--surface-h:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.08);--border-g:rgba(212,175,100,0.3);
  --gold:#d4af64;--gold-l:#f0d080;--gold-dim:rgba(212,175,100,0.12);
  --text:#ede8e0;--text2:#9e9888;--text3:#5c5850;
  --danger:#e07070;--teal:#5ecfb8;--blue:#6ab0e0;
  --amber:#e0a84a;--rose:#e08090;--lav:#a090d8;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
/* Strong radial glow from top-center */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -2%, rgba(212,175,100,.50) 0%, rgba(212,175,100,.18) 45%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 12% 65%, rgba(94,207,184,.12) 0%, transparent 60%),
    radial-gradient(ellipse 45% 35% at 90% 75%, rgba(106,176,224,.10) 0%, transparent 55%)}
/* Canvas dot-grid injected by JS below */
.wrap{max-width:860px;margin:0 auto;padding:72px 28px 100px;position:relative;z-index:1}

/* HEADER */
header{margin-bottom:60px;animation:fadeDown .8s cubic-bezier(.22,1,.36,1) both}
.eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--gold);opacity:.5}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.4rem);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:16px}
h1 em{font-style:italic;color:var(--gold)}
.tagline{font-size:.9rem;color:var(--text2);line-height:1.7;max-width:520px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px;margin-bottom:36px;
  backdrop-filter:blur(16px);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 32px 80px rgba(0,0,0,.45);
  animation:fadeDown .8s .12s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,100,.35),transparent)}

/* REPO BADGE */
.repo-badge{display:flex;align-items:center;gap:14px;padding:13px 16px;
  background:rgba(212,175,100,.06);border:1px solid var(--border-g);border-radius:12px;margin-bottom:26px}
.repo-icon{width:34px;height:34px;background:var(--gold-dim);border:1px solid var(--border-g);border-radius:8px;
  display:grid;place-items:center;font-size:.85rem;flex-shrink:0}
.repo-meta{flex:1}
.repo-lbl{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.repo-val{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--gold)}
.repo-lock{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);padding:4px 10px;border:1px solid rgba(255,255,255,.07);border-radius:100px}

/* INPUTS */
.flabel{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:block}
.srow{display:flex;gap:12px;align-items:flex-end}
.srow .field{flex:1}
input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:300;
  outline:none;transition:border-color .25s,box-shadow .25s,background .25s}
input[type=text]:focus{border-color:var(--border-g);background:rgba(212,175,100,.04);box-shadow:0 0 0 4px rgba(212,175,100,.08)}
input[type=text]::placeholder{color:var(--text3)}

/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:9px;
  background:linear-gradient(140deg,#d4af64,#b8922c);color:#0e0c08;
  border:none;border-radius:12px;padding:14px 26px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;
  cursor:pointer;transition:transform .2s,box-shadow .2s,opacity .15s;
  white-space:nowrap;box-shadow:0 4px 20px rgba(212,175,100,.18)}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 36px rgba(212,175,100,.32)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* CHIPS */
.filters{display:flex;gap:6px;margin-top:22px;flex-wrap:wrap;align-items:center}
.fltr-lbl{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-right:4px}
.chip{font-family:'DM Mono',monospace;font-size:.68rem;padding:5px 13px;border-radius:100px;
  border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;
  transition:all .2s;letter-spacing:.04em}
.chip:hover{border-color:rgba(212,175,100,.2);color:var(--text2)}
.chip.active{border-color:var(--border-g);color:var(--gold);background:var(--gold-dim)}

/* STATUS */
.status-bar{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:.72rem;
  color:var(--text2);margin-bottom:24px;min-height:22px;animation:fadeIn .3s ease;letter-spacing:.03em}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(212,175,100,.6);animation:pulse 1.2s infinite}

/* ERROR */
.err{background:rgba(224,112,112,.07);border:1px solid rgba(224,112,112,.2);border-radius:12px;
  padding:16px 20px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--danger);line-height:1.6}

/* AI PANEL */
.ai-panel{background:linear-gradient(135deg,rgba(212,175,100,.05),rgba(94,207,184,.04));
  border:1px solid var(--border-g);border-radius:18px;padding:28px;margin-bottom:28px;
  animation:fadeIn .5s ease both;position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;top:0;left:6%;right:6%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,100,.4),transparent)}
.ai-hdr{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ai-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(212,175,100,.2),transparent)}
.ai-panel p{font-size:.92rem;line-height:1.85;color:var(--text);font-weight:300}

/* RESULTS HDR */
.res-hdr{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.res-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* RESULT CARD */
.result{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:22px 24px;margin-bottom:10px;cursor:pointer;
  transition:border-color .25s,transform .25s,background .25s,box-shadow .25s;
  animation:slideUp .4s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
.result::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:2px;
  background:linear-gradient(180deg,var(--gold),var(--teal));opacity:0;border-radius:0 2px 2px 0;transition:opacity .25s}
.result:hover{border-color:var(--border-g);background:var(--surface-h);transform:translateX(6px);box-shadow:0 8px 40px rgba(0,0,0,.35)}
.result:hover::before{opacity:1}

.res-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.badge{font-family:'DM Mono',monospace;font-size:.58rem;padding:3px 9px;border-radius:6px;
  border:1px solid;white-space:nowrap;margin-top:2px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.b-readme{color:var(--teal);border-color:rgba(94,207,184,.3);background:rgba(94,207,184,.08)}
.b-doc   {color:var(--blue);border-color:rgba(106,176,224,.3);background:rgba(106,176,224,.08)}
.b-code  {color:var(--amber);border-color:rgba(224,168,74,.3);background:rgba(224,168,74,.08)}
.b-config{color:var(--rose);border-color:rgba(224,128,144,.3);background:rgba(224,128,144,.08)}
.b-test  {color:var(--lav);border-color:rgba(160,144,216,.3);background:rgba(160,144,216,.08)}
.b-file  {color:var(--text2);border-color:rgba(158,152,136,.2);background:rgba(158,152,136,.06)}

.res-path{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text2);word-break:break-all;line-height:1.6}
.res-path .fn{color:var(--text);font-weight:500}

.rel-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rel-track{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.rel-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:2px}
.rel-score{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text3);width:32px;text-align:right}
.res-reason{font-size:.875rem;line-height:1.75;color:var(--text2);font-weight:300}

/* SKELETON */
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:10px}
.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:6px;display:inline-block}

/* EMPTY */
.empty{text-align:center;padding:72px 24px;animation:fadeIn .5s ease}
.empty-icon{font-size:2.4rem;margin-bottom:20px;opacity:.35}
.empty h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;color:var(--text2);margin-bottom:10px}
.empty p{font-size:.875rem;line-height:1.8;color:var(--text3);max-width:380px;margin:0 auto}
.empty em{color:var(--gold);font-style:normal}

/* KEYFRAMES */
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

@media(max-width:600px){.srow{flex-direction:column;align-items:stretch}.btn{justify-content:center}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Knowledge Intelligence</div>
    <h1>Tech Tips <em>by LLM</em></h1>
    <p class="tagline">Ask anything in plain English — AI searches your repository and surfaces exactly what you need.</p>
  </header>

  <div class="card">
    <div class="repo-badge" style="display:none">
      <div class="repo-icon">⌥</div>
      <div class="repo-meta">
        <div class="repo-lbl">Source Repository</div>
        <div class="repo-val">github.com/techbyllm/techtips1</div>
      </div>
      <span class="repo-lock">🔒 locked</span>
    </div>

    <div class="srow">
      <div class="field">
        <label class="flabel" for="queryInput">Your Question</label>
        <input type="text" id="queryInput" placeholder="e.g. How do I remove hyperlinks from a Word document?" />
      </div>
      <button class="btn" id="searchBtn" onclick="startSearch()">
        <span>✦</span> Search
      </button>
    </div>

    <div class="filters">
      <span class="fltr-lbl">Search in</span>
      <button class="chip active" data-filter="readme"  onclick="toggleFilter(this)">README</button>
      <button class="chip active" data-filter="docs"    onclick="toggleFilter(this)">Docs</button>
      <button class="chip active" data-filter="code"    onclick="toggleFilter(this)">Code</button>
      <button class="chip active" data-filter="config"  onclick="toggleFilter(this)">Config</button>
      <button class="chip active" data-filter="tests"   onclick="toggleFilter(this)">Tests</button>
      <button class="chip active" data-filter="files"   onclick="toggleFilter(this)">Other</button>
    </div>
  </div>

  <div id="statusBar" class="status-bar" style="display:none"></div>
  <div id="output"></div>

</div>
<script>
const ACTIVE=new Set(['readme','docs','code','config','tests','files']);
function toggleFilter(el){const f=el.dataset.filter;ACTIVE.has(f)?(ACTIVE.delete(f),el.classList.remove('active')):(ACTIVE.add(f),el.classList.add('active'))}
function setStatus(msg,loading=true){const b=document.getElementById('statusBar');if(!msg){b.style.display='none';return}b.style.display='flex';b.innerHTML=loading?`<div class="pulse"></div><span>${msg}</span>`:`<span style="color:var(--gold)">✦</span><span>${msg}</span>`}
function bc(t){return{readme:'b-readme',doc:'b-doc',code:'b-code',config:'b-config',test:'b-test',file:'b-file'}[t]||'b-file'}
function bl(t){return{readme:'Readme',doc:'Doc',code:'Code',config:'Config',test:'Test',file:'File'}[t]||'File'}
async function startSearch(){
  const q=document.getElementById('queryInput').value.trim();
  const out=document.getElementById('output');
  if(!q){out.innerHTML='<div class="err">Please enter a question to search.</div>';return}
  const btn=document.getElementById('searchBtn');
  btn.disabled=true;out.innerHTML='';setStatus('Searching repository…');
  out.innerHTML=[0,1,2].map(()=>`<div class="skel-card"><div style="display:flex;gap:12px;margin-bottom:14px"><span class="skel" style="width:52px;height:18px"></span><span class="skel" style="width:200px;height:16px"></span></div><span class="skel" style="width:100%;height:2px;margin-bottom:14px;display:block"></span><span class="skel" style="width:88%;height:13px;margin-bottom:8px;display:block"></span><span class="skel" style="width:65%;height:13px;display:block"></span></div>`).join('');
  try{
    const res=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,filters:[...ACTIVE]})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||`Server error ${res.status}`);
    out.innerHTML='';
    setStatus(`${data.results?.length||0} result${data.results?.length!==1?'s':''} found`,false);
    if(data.summary)out.innerHTML+=`<div class="ai-panel"><div class="ai-hdr">✦ AI Analysis</div><p>${data.summary}</p></div>`;
    if(!data.results?.length){
      out.innerHTML+=`<div class="empty"><div class="empty-icon">◎</div><h3>Nothing found</h3><p>Try rephrasing your question or enabling more file type filters.</p></div>`;
    }else{
      out.innerHTML+=`<div class="res-hdr">${data.results.length} result${data.results.length!==1?'s':''}</div>`;
      data.results.forEach((r,i)=>{
        const parts=r.path.split('/');const fname=parts.pop();const dir=parts.length?parts.join('/')+'/ ':'';
        const rawUrl=`https://raw.githubusercontent.com/${data.owner}/${data.repo}/${data.branch}/${r.path}`;
        out.innerHTML+=`<div class="result" style="animation-delay:${i*.07}s" onclick="openFile('${rawUrl}','${r.path}','${r.type}')"><div class="res-top"><span class="badge ${bc(r.type)}">${bl(r.type)}</span><div class="res-path">${dir?`<span>${dir}</span>`:''}<span class="fn">${fname}</span></div></div><div class="rel-bar"><div class="rel-track"><div class="rel-fill" style="width:${r.relevance||50}%"></div></div><span class="rel-score">${r.relevance||'—'}%</span></div><div class="res-reason">${r.reason}</div></div>`;
      });
    }
  }catch(err){out.innerHTML='';setStatus('');out.innerHTML=`<div class="err">⚠ ${err.message}</div>`}
  finally{btn.disabled=false}
}
document.getElementById('queryInput').addEventListener('keydown',e=>{if(e.key==='Enter')startSearch()});
</script>

<script>
function openFile(rawUrl, path, type) {
  const ext = path.split('.').pop().toLowerCase();
  const fname = path.split('/').pop();

  // Determine how to render
  const isImage = ['png','jpg','jpeg','gif','svg','webp','ico'].includes(ext);
  const isDoc   = ['docx','xlsx','pdf','pptx'].includes(ext);

  const win = window.open('', '_blank');
  if (!win) return;

  // Write loading state immediately
  win.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8">
  <title>${fname}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0e12;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
      --border-g:rgba(212,175,100,.3);--gold:#d4af64;--gold-dim:rgba(212,175,100,.1);
      --text:#ede8e0;--text2:#9e9888;--text3:#5c5850;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;
      min-height:100vh;padding:0;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(212,175,100,.22) 0%,rgba(212,175,100,.06) 45%,transparent 70%)}
    .topbar{position:sticky;top:0;z-index:100;background:rgba(14,14,18,.92);
      backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
      padding:14px 32px;display:flex;align-items:center;gap:16px;}
    .topbar-brand{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;
      color:var(--gold);letter-spacing:-.01em;}
    .topbar-sep{color:var(--text3);font-size:.9rem}
    .topbar-path{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text2);
      word-break:break-all;flex:1;}
    .topbar-path .fname{color:var(--text);font-weight:500}
    .badge{font-family:'DM Mono',monospace;font-size:.58rem;padding:3px 9px;border-radius:6px;
      border:1px solid var(--border-g);background:var(--gold-dim);color:var(--gold);
      text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .content{max-width:900px;margin:0 auto;padding:48px 32px 80px;position:relative;z-index:1;}
    .loading{text-align:center;padding:80px 20px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.8rem;letter-spacing:.06em;}
    .loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
      background:var(--gold);margin:0 3px;animation:ld .9s infinite;opacity:.3}
    .loading-dot:nth-child(2){animation-delay:.2s}
    .loading-dot:nth-child(3){animation-delay:.4s}
    @keyframes ld{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
    /* Plain text / code */
    pre{font-family:'DM Mono',monospace;font-size:.82rem;line-height:1.75;color:#c8c0b0;
      background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;
      padding:28px 32px;overflow-x:auto;white-space:pre-wrap;word-break:break-word;
      animation:fadeIn .4s ease}
    /* Markdown */
    .md-body{animation:fadeIn .4s ease;line-height:1.8}
    .md-body h1,.md-body h2,.md-body h3,.md-body h4{font-family:'Playfair Display',serif;
      color:var(--text);margin:1.8em 0 .6em;line-height:1.2}
    .md-body h1{font-size:2rem;padding-bottom:.4em;border-bottom:1px solid var(--border)}
    .md-body h2{font-size:1.4rem;padding-bottom:.3em;border-bottom:1px solid rgba(255,255,255,.05)}
    .md-body h3{font-size:1.1rem;color:var(--gold)}
    .md-body p{margin:.8em 0;color:var(--text2);font-weight:300}
    .md-body a{color:var(--gold);text-decoration:underline;text-underline-offset:3px}
    .md-body strong{color:var(--text);font-weight:500}
    .md-body em{color:var(--text2);font-style:italic}
    .md-body code{font-family:'DM Mono',monospace;font-size:.82em;background:rgba(212,175,100,.1);
      border:1px solid rgba(212,175,100,.2);border-radius:4px;padding:1px 6px;color:var(--gold)}
    .md-body pre{margin:1.2em 0}
    .md-body pre code{background:none;border:none;padding:0;color:#c8c0b0;font-size:.82rem}
    .md-body ul,.md-body ol{padding-left:1.6em;margin:.6em 0;color:var(--text2)}
    .md-body li{margin:.3em 0}
    .md-body blockquote{border-left:3px solid var(--gold);padding:.4em 1em;
      margin:1em 0;background:var(--gold-dim);border-radius:0 8px 8px 0;color:var(--text2)}
    .md-body hr{border:none;border-top:1px solid var(--border);margin:2em 0}
    .md-body table{width:100%;border-collapse:collapse;margin:1em 0;font-size:.88rem}
    .md-body th{background:rgba(212,175,100,.1);color:var(--gold);padding:10px 14px;
      text-align:left;border:1px solid var(--border-g);font-weight:500}
    .md-body td{padding:8px 14px;border:1px solid var(--border);color:var(--text2);vertical-align:top}
    .md-body tr:nth-child(even) td{background:rgba(255,255,255,.02)}
    .md-body img{max-width:100%;border-radius:8px;margin:.6em 0}
    /* Image viewer */
    .img-wrap{text-align:center;animation:fadeIn .4s ease}
    .img-wrap img{max-width:100%;border-radius:12px;border:1px solid var(--border);
      box-shadow:0 20px 60px rgba(0,0,0,.5)}
    /* Binary notice */
    .binary-notice{background:rgba(212,175,100,.06);border:1px solid var(--border-g);
      border-radius:14px;padding:32px;text-align:center;animation:fadeIn .4s ease}
    .binary-notice h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);margin-bottom:10px}
    .binary-notice p{font-size:.88rem;color:var(--text2);line-height:1.7;margin-bottom:20px}
    .binary-notice a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(140deg,#d4af64,#b8922c);
      color:#0e0c08;padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:500;
      text-decoration:none;transition:transform .2s,box-shadow .2s}
    .binary-notice a:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,175,100,.3)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
  </head><body>
  <div class="topbar">
    <span class="topbar-brand">Tech Tips by LLM</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-path" id="tp-path">Loading…</span>
    <span class="badge" id="tp-badge">FILE</span>
  </div>
  <div class="content" id="content">
    <div class="loading">
      <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
    </div>
  </div>
  <script>
  const path="${path.replace(/\\/g,'/')}";
  const type="${type}";
  const ext="${ext}";
  const fname="${fname}";
  const rawUrl="${rawUrl}";
  const badgeLabels={readme:'Readme',doc:'Doc',code:'Code',config:'Config',test:'Test',file:'File'};

  // Set topbar
  const parts=path.split('/');const fn=parts.pop();const dir=parts.join('/');
  document.getElementById('tp-path').innerHTML=(dir?'<span style="color:var(--text3)">'+dir+'/</span>':'')+
    '<span class="fname">'+fn+'</span>';
  document.getElementById('tp-badge').textContent=badgeLabels[type]||'File';

  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  // Simple markdown → HTML renderer
  function renderMd(md){
    let h=md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // fenced code
      .replace(/\`\`\`([^\n]*)\n([\s\S]*?)\`\`\`/g,(_,lang,code)=>'<pre><code>'+code+'</code></pre>')
      // headings
      .replace(/^#{6}\s(.+)$/gm,'<h6>$1</h6>')
      .replace(/^#{5}\s(.+)$/gm,'<h5>$1</h5>')
      .replace(/^#{4}\s(.+)$/gm,'<h4>$1</h4>')
      .replace(/^###\s(.+)$/gm,'<h3>$1</h3>')
      .replace(/^##\s(.+)$/gm,'<h2>$1</h2>')
      .replace(/^#\s(.+)$/gm,'<h1>$1</h1>')
      // hr
      .replace(/^[-*]{3,}$/gm,'<hr>')
      // blockquote
      .replace(/^&gt;\s?(.+)$/gm,'<blockquote>$1</blockquote>')
      // bold / italic / inline code
      .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/\`([^\`]+)\`/g,'<code>$1</code>')
      // links & images
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
      // lists
      .replace(/^\s*[-*+]\s(.+)$/gm,'<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
      .replace(/<\/ul>\s*<ul>/g,'')
      // paragraphs
      .replace(/\n{2,}/g,'</p><p>')
    return '<p>'+h+'</p>';
  }

  fetch(rawUrl)
    .then(r=>{
      if(!r.ok) throw new Error('Could not load file ('+r.status+')');
      return r.arrayBuffer();
    })
    .then(buf=>{
      const bytes=new Uint8Array(buf);
      // Check for binary (non-text) content
      let isBinary=false;
      for(let i=0;i<Math.min(bytes.length,512);i++){
        if(bytes[i]===0){isBinary=true;break}
      }
      const el=document.getElementById('content');
      if(isBinary||['docx','xlsx','pdf','pptx','doc','xls'].includes(ext)){
        el.innerHTML='<div class="binary-notice"><h3>Binary File</h3><p>This file type ('+ext.toUpperCase()+') cannot be displayed as text in the browser.</p></div>';
        return;
      }
      const text=new TextDecoder('utf-8').decode(buf);
      if(['md','markdown','rst'].includes(ext)){
        el.innerHTML='<div class="md-body">'+renderMd(text)+'</div>';
      } else if(['png','jpg','jpeg','gif','svg','webp','ico'].includes(ext)){
        el.innerHTML='<div class="img-wrap"><img src="'+rawUrl+'" alt="'+fname+'"></div>';
      } else {
        el.innerHTML='<pre>'+escHtml(text)+'</pre>';
      }
    })
    .catch(err=>{
      document.getElementById('content').innerHTML='<div class="err" style="background:rgba(224,112,112,.07);border:1px solid rgba(224,112,112,.2);border-radius:12px;padding:20px;font-family:DM Mono,monospace;font-size:.8rem;color:#e07070">⚠ '+err.message+'</div>';
    });
  <\/script>
  </body></html>`);
  win.document.close();
}
</script>
</body>
</html>
